<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.name }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ site.tagline }}{% endblock %}">

    {# ── SEO / Open Graph ── #}
    <meta property="og:site_name" content="{{ site.name }}">
    <meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}{{ self.meta_description() }}{% endblock %}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    {% block og_extra %}{% endblock %}
    <link rel="canonical" href="https://{{ site.domain }}{{ request.url.path }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        // FOUC prevention — set theme before stylesheets load.
        (function () {
            var t = localStorage.getItem('theme');
            if (t !== 'light' && t !== 'dark') t = 'dark';
            document.documentElement.setAttribute('data-bs-theme', t);
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', path='css/site.css') }}" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    {% include "partials/nav.html" %}

    <main class="qt-shell {% block shell_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-bs-theme') || 'dark';
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            document.dispatchEvent(new CustomEvent('themechange', { detail: { theme: next } }));
        }
        document.addEventListener('htmx:afterRequest', function (evt) {
            const msg = evt.detail.xhr.getResponseHeader('HX-Trigger');
            if (!msg) return;
            try {
                const t = JSON.parse(msg);
                if (t.showToast) showToast(t.showToast.message, t.showToast.type || 'success');
            } catch (e) {}
        });
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const bgClass = type === 'error' ? 'text-bg-danger' : 'text-bg-success';
            const icon = type === 'error' ? 'bi-exclamation-triangle' : 'bi-check-circle';
            container.insertAdjacentHTML('beforeend',
                `<div class="toast align-items-center ${bgClass} border-0" role="alert"><div class="d-flex">
                 <div class="toast-body d-flex align-items-center gap-2"><i class="bi ${icon}"></i>${message}</div>
                 <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`);
            const el = container.lastElementChild;
            const toast = new bootstrap.Toast(el, { delay: 3000 });
            toast.show();
            el.addEventListener('hidden.bs.toast', () => el.remove());
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
