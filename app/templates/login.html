{% extends "base.html" %}
{% block shell_class %}narrow{% endblock %}
{% block title %}Sign in — {{ site.name }}{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 2rem auto;">
    <div class="qt-panel">
        <div class="qt-panel-head"><span class="qt-panel-head-title"><i class="bi bi-box-arrow-in-right"></i> Sign in</span></div>
        <div class="qt-panel-body">
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <form method="post" action="/login">
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input class="form-control" name="username" autocomplete="username" autofocus required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" name="password" autocomplete="current-password" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Continue</button>
            </form>
            <p class="form-text mt-3 mb-0">Members only. <a href="/request-access">Request access</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
