{% extends "base.html" %}
{% block shell_class %}narrow{% endblock %}
{% block title %}Sign in &mdash; {{ site.name }}{% endblock %}
{% block content %}
<div style="max-width: 380px; margin: 3rem auto;">
    <span class="eyebrow">The masthead</span>
    <h1 style="font-size: 2.4rem; margin: 0.4rem 0 1.4rem;">Sign in.</h1>

    {% if error %}<div class="alert alert-danger mb-3">{{ error }}</div>{% endif %}

    <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" autocomplete="username" autofocus required>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Continue &rarr;</button>
    </form>
    <p class="form-text mt-3 mb-0">Members only. <a href="/request-access">Request access</a>.</p>
</div>
{% endblock %}
