{# Library list (refreshable). Admin gets a delete button per library. #}
{% if libs %}
<div class="qt-grid cols-3">
    {% for item in libs %}
    <div class="qt-tile" style="position: relative; flex-direction: row; align-items: center; justify-content: space-between;">
        <a href="/arcticdb/{{ item.name }}" class="qt-tile-title" style="font-family: var(--mono); font-size: 0.95rem; text-decoration: none;">
            <i class="bi bi-table" style="color: var(--accent);"></i> {{ item.name }}
        </a>
        {% if is_admin %}
        <button class="btn btn-sm btn-outline-danger"
                hx-delete="/arcticdb/api/library/{{ item.name }}" hx-target="#library-list" hx-swap="innerHTML"
                hx-confirm="Delete library '{{ item.name }}'? This cannot be undone."
                onclick="event.stopPropagation();" title="Delete library"><i class="bi bi-trash"></i></button>
        {% endif %}
    </div>
    {% endfor %}
</div>
<div class="mt-3 eyebrow" style="color: var(--ink-4);">{{ libs | length }} libraries · click to browse symbols</div>
{% else %}
<div class="alert alert-info mb-0">No libraries.</div>
{% endif %}
