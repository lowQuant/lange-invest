{# Chart panel — reuses the shared LangeChart module.
   Expects: chart_id, chart (main spec dict), subplots (list, optional). #}
<div class="chart-container">
    <div id="{{ chart_id }}-panels">
        <div style="position:relative; height:380px;">
            <canvas id="{{ chart_id }}"></canvas>
        </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-2 px-1">
        <span class="label-mono" id="{{ chart_id }}-count"></span>
        <div class="d-flex gap-1 align-items-center">
            <span class="label-mono" style="color: var(--ink-4);">Drag to zoom</span>
            <button class="btn btn-sm btn-outline-secondary" onclick="window._langeCharts && window._langeCharts.forEach(c=>c.resetZoom&&c.resetZoom())">
                <i class="bi bi-arrows-angle-contract"></i> Reset
            </button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
<script src="{{ url_for('static', path='js/charts.js') }}"></script>
<script>
(function () {
    const main = {{ chart | tojson }};
    const subs = {{ (subplots or []) | tojson }};
    const container = document.getElementById("{{ chart_id }}-panels");

    const total = (main.datasets || []).reduce((s, d) => s + d.data.filter(v => v !== null).length, 0);
    document.getElementById("{{ chart_id }}-count").textContent = total.toLocaleString() + " data points";

    subs.forEach((sp, i) => {
        const div = document.createElement("div");
        div.style.cssText = "position:relative;height:160px;margin-top:8px;padding-top:8px;border-top:1px solid var(--line-1);";
        const cv = document.createElement("canvas");
        cv.id = "{{ chart_id }}-sub-" + i;
        div.appendChild(cv);
        container.appendChild(div);
    });

    function draw() {
        LangeChart.mount("{{ chart_id }}", main, { isMain: true });
        subs.forEach((sp, i) => LangeChart.mount("{{ chart_id }}-sub-" + i, sp, { isMain: false }));
    }
    if (window.Chart) requestAnimationFrame(draw);
    else window.addEventListener('load', draw);
})();
</script>
