{# Inline numerical strip. Expects `stats`: list of {label, value, dir?(up|down)}. #}
{% if stats %}
<div class="numerals">
    {% for s in stats %}
    <div class="numeral">
        <span class="n-label">{{ s.label }}</span>
        <span class="n-value {{ s.dir or '' }}">{{ s.value }}</span>
    </div>
    {% endfor %}
</div>
{% endif %}
