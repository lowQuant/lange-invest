{# Slim top bar: brand + theme/account only. Section nav lives in the sidebar. #}
<header class="topbar">
    <a href="/" class="qt-brand">
        <span class="qt-brand-mark"><span></span><span></span><span></span><span></span></span>
        lange<span style="color: var(--accent);">·</span>invest
    </a>

    <div class="topbar-right">
        <button class="theme-toggle" type="button" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
            <i class="bi bi-sun-fill"></i>
            <i class="bi bi-moon-stars-fill"></i>
        </button>
        {% if user %}
        <div class="dropdown">
            <a class="topbar-account dropdown-toggle" data-bs-toggle="dropdown" href="#">
                <span class="status-dot" title="Signed in"></span>
                <span>{{ user.username }}</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
                <li class="px-2 py-1 eyebrow">{{ user.role }}</li>
                {% if user.is_admin %}
                <li><a class="dropdown-item" href="/admin"><i class="bi bi-sliders"></i> Admin · Viewer</a></li>
                <li><hr class="dropdown-divider"></li>
                {% endif %}
                <li><form method="post" action="/logout">
                    <button type="submit" class="dropdown-item text-danger"><i class="bi bi-power"></i> Sign out</button>
                </form></li>
            </ul>
        </div>
        {% else %}
        <a class="btn btn-sm btn-outline-secondary" href="/login"><i class="bi bi-box-arrow-in-right"></i> Sign in</a>
        {% endif %}
    </div>
</header>
