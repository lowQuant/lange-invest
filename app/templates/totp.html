{% extends "base.html" %}
{% block shell_class %}narrow{% endblock %}
{% block title %}Two-factor &mdash; {{ site.name }}{% endblock %}
{% block content %}
<div style="max-width: 380px; margin: 3rem auto;">
    <span class="eyebrow">Verification</span>
    <h1 style="font-size: 2.2rem; margin: 0.4rem 0 1.4rem;">Two-factor.</h1>

    {% if error %}<div class="alert alert-danger mb-3">{{ error }}</div>{% endif %}
    <p class="form-text mb-3">Enter the 6-digit code from your authenticator app.</p>

    <form method="post" action="/login/verify">
        <input type="hidden" name="next" value="{{ next }}">
        <div class="mb-4">
            <input class="form-control" name="code" inputmode="numeric" pattern="[0-9 ]*"
                   autocomplete="one-time-code" placeholder="000000" autofocus required
                   style="font-family: var(--mono); font-size: 1.5rem; letter-spacing: 0.3em; text-align: center;">
        </div>
        <button class="btn btn-primary w-100" type="submit">Verify &rarr;</button>
    </form>
</div>
{% endblock %}
