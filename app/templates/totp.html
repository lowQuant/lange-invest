{% extends "base.html" %}
{% block shell_class %}narrow{% endblock %}
{% block title %}Two-factor — {{ site.name }}{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 2rem auto;">
    <div class="qt-panel">
        <div class="qt-panel-head"><span class="qt-panel-head-title"><i class="bi bi-shield-lock"></i> Two-factor authentication</span></div>
        <div class="qt-panel-body">
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <p class="form-text">Enter the 6-digit code from your authenticator app.</p>
            <form method="post" action="/login/verify">
                <input type="hidden" name="next" value="{{ next }}">
                <div class="mb-3">
                    <input class="form-control mono" name="code" inputmode="numeric" pattern="[0-9 ]*"
                           autocomplete="one-time-code" placeholder="000000" autofocus required
                           style="font-size:1.4rem; letter-spacing:0.3em; text-align:center;">
                </div>
                <button class="btn btn-primary w-100" type="submit">Verify</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
