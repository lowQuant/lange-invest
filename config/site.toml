# ─────────────────────────────────────────────────────────────────────────────
# lange-invest.com — site configuration
#
# This file is the single source of truth for:
#   • the public-readable library allowlist (security boundary)
#   • the asset-class / strategy-variant taxonomy (data-driven sub-nav)
#
# It is intentionally declarative and contains NO secrets. Secrets (S3, IBKR
# Flex token, MCP tokens, session key) live in environment variables only.
# ─────────────────────────────────────────────────────────────────────────────

[site]
name = "lange-invest"
tagline = "Systematic strategies, transparent signals."
domain = "lange-invest.com"

# ── Security: public-readable library allowlist ──────────────────────────────
# public_access.py refuses to list, read, describe, or even *enumerate* any
# ArcticDB library not named here. IBKR account / real-portfolio libraries must
# NEVER appear in this list — they are reachable only via /admin and the MCP
# admin scope.
[access]
# Libraries whose data may be exposed through the public/gated read path.
public_libraries = [
    "equities_signals",
    "equities_stats",
    "futures_signals",
    "futures_stats",
    "universe",
    "model_portfolio",
    # Public Database browser (open to anyone), read-only:
    "futures",
    "market_data",
]

# Libraries surfaced in the public "Database" tab (open to anyone, read-only).
# Must also appear in public_libraries above so public_access permits them.
[[database_library]]
name = "futures"
label = "Futures"
description = "Continuously-rolled futures across the liquid global complex. Charting enabled."
chart = true

[[database_library]]
name = "market_data"
label = "Stocks"
description = "Daily OHLCV market data for the US equity universe. Charting enabled."
chart = true

# Libraries that are explicitly protected. Even with an admin MCP token, the
# server refuses destructive ops against these unless an override env flag is
# set. (Belt-and-suspenders alongside the allowlist.)
protected_libraries = [
    "ibkr_account",
    "ibkr_flex",
    "real_portfolio",
]

# ── Asset-class & strategy taxonomy (data-driven sub-nav) ────────────────────
# Each asset class renders a landing page; its `variants` become the sub-nav.
# Adding a variant here is all that's needed to surface a new strategy page —
# nothing is hardcoded in templates or routes.

[[asset_class]]
slug = "equities"
name = "Equities"
icon = "bi-bar-chart-line"
blurb = "Four equity books on a liquid US universe — one for reversion, one for trend, a short sleeve, and the blend that combines them."

  [[asset_class.variant]]
  slug = "mean-reversion"
  name = "Mean Reversion"
  blurb = "Buys liquid names after sharp, news-light selloffs and exits as they normalise."
  methodology = "Each day we rank the universe by short-horizon drawdown relative to its own volatility and enter the most oversold names that still pass a liquidity and trend-quality filter. Positions are equal-risk weighted and exit on mean reversion or a fixed time stop, so holding periods stay measured in days rather than weeks."
  signals_symbol = "mean_reversion"
  stats_symbol = "mean_reversion"

  [[asset_class.variant]]
  slug = "long"
  name = "Long"
  blurb = "Holds quality companies in confirmed uptrends and steps aside when trend breaks."
  methodology = "A long-only book that scores the universe on trend persistence and momentum, then holds the leaders subject to a quality screen. Exposure scales down as breadth deteriorates, so the book spends weak markets in cash rather than fighting the tape."
  signals_symbol = "long"
  stats_symbol = "long"

  [[asset_class.variant]]
  slug = "short"
  name = "Short"
  blurb = "A risk-managed short sleeve that hedges the book when trend and breadth roll over."
  methodology = "The short sleeve targets names in confirmed downtrends with weakening fundamentals, sized to cushion the long book in drawdowns rather than to carry the return on its own. Borrow cost and crowding checks keep the basket tradable."
  signals_symbol = "short"
  stats_symbol = "short"

  [[asset_class.variant]]
  slug = "base"
  name = "Base"
  blurb = "The combined equity allocation that blends reversion, long, and short into one book."
  methodology = "Base is the production equity allocation: the sub-strategies are combined at the portfolio level so their returns offset rather than compound risk. Weights are set by each sleeve's risk contribution and rebalanced on a fixed cadence."
  signals_symbol = "base"
  stats_symbol = "base"

[[asset_class]]
slug = "futures"
name = "Futures"
icon = "bi-graph-up-arrow"
blurb = "Continuously-rolled futures programs across the liquid global complex — equity index, rates, FX, energy, and metals."

  [[asset_class.variant]]
  slug = "trend"
  name = "Trend"
  blurb = "Time-series momentum that goes long winners and short losers across the whole complex."
  methodology = "Classic time-series momentum: each market is sized long or short by the sign and strength of its own multi-horizon trend, scaled to a common risk target so no single market dominates. Diversification across roughly two dozen liquid contracts does the heavy lifting."
  signals_symbol = "trend"
  stats_symbol = "trend"

  [[asset_class.variant]]
  slug = "carry"
  name = "Carry"
  blurb = "Harvests the roll yield embedded in each market's term structure, long and short."
  methodology = "A cross-sectional carry book that is long markets in backwardation and short those in contango, ranked by roll yield net of estimated cost. Positions are risk-weighted and netted against the trend book so the two programs share margin efficiently."
  signals_symbol = "carry"
  stats_symbol = "carry"
